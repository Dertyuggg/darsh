<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Someone Special ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div id="gradient"></div>

    <div id="hearts"></div>

    <div id="petals"></div>

    <div id="sparkles"></div>

    <div class="musicButton" id="musicBtn">
        <i class="fa-solid fa-music"></i>
    </div>

    <div class="glassCard">

        <div class="badge">

            💌 A Little Surprise

        </div>

        <h1>

            hbd bbg
        </h1>

        <h2>

            ❤️❤️❤️

        </h2>

        <div class="catBox">

            <img src="cat.png" id="cat">

            <div class="speechBubble" id="speechBubble">

                Meow! 🐱

            </div>

        </div>

        <p class="subtitle">

            Hey Bootiful 🌸

        </p>

        <h3>

            I have something to ask you...

        </h3>

        <p class="question">

            Would you like to open your surprise?

        </p>

        <div class="buttons">

            <button id="yesBtn">

                💖 YES PLEASE

            </button>

            <button id="noBtn">

                💔 NO THANKS

            </button>

        </div>

        <p id="messageBox"></p>

    </div>

    <div class="popup" id="giftPopup">

        <div class="popupContent">

            <h1>

                😙😙😙😙

            </h1>

            <img src="cat2.png" class="popupCat">

            <p>

                You said YES 😜

                <br><br>

                Your surprise is loading...

            </p>

            <button onclick="goToGift()">

                Continue ❤️

            </button>

        </div>

    </div>

    <audio id="music" loop>

        <source src="music.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>
